name: AFM Maryll export
on:
  push:
    branches: [tmp/afm-maryll-photos-20260712]
  pull_request:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 lxml pillow
      - run: python tools/afm_maryll_scrape.py
      - uses: actions/upload-artifact@v4
        with:
          name: AFM_Maryll_Optiques_photos
          path: AFM_Maryll_Optiques_photos.zip
          if-no-files-found: error
          retention-days: 1
